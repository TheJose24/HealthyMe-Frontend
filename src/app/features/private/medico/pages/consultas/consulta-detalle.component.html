<ng-container *ngIf="!loading">
  <header
    class="flex flex-col gap-6 rounded-2xl bg-white p-6 shadow ring-1 ring-gray-100 lg:flex-row lg:items-center lg:justify-between"
  >
    <div>
      <h2 class="text-2xl font-semibold text-gray-900">
        {{ paciente.nombreCompleto }}
      </h2>
      <p class="text-sm text-gray-500">HC&nbsp;#{{ paciente.id }}</p>
      <p class="text-xs text-gray-400">{{ cita.fecha | date: 'fullDate' }} · {{ cita.hora }}</p>
    </div>
    <button
      type="button"
      (click)="openHistorial()"
      class="group inline-flex items-center gap-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 px-6 py-3 text-base font-semibold text-white shadow-md transition duration-200 ease-in-out hover:scale-[1.03] hover:shadow-lg focus:outline-none focus:ring-4 focus:ring-emerald-300 active:scale-100"
    >
      <svg
        class="h-6 w-6 shrink-0 text-white transition-transform duration-200 group-hover:rotate-45"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      Historial clínico
    </button>
  </header>

  <form class="mt-12 grid gap-12 lg:grid-cols-12" (ngSubmit)="onGuardarClick()">
    <div class="space-y-8 lg:col-span-7">
      <h2
        class="flex items-center gap-3 text-2xl font-extrabold leading-tight tracking-tight text-gray-900"
      >
        <svg
          class="text-primary-600 h-7 w-7 shrink-0"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 2.25h6m-3 0v1.5m-6 2.25h12a2.25 2.25 0 012.25
         2.25v11.25A2.25 2.25 0 0118 21H6a2.25 2.25 0
         01-2.25-2.25V6A2.25 2.25 0 016 3.75h3z"
          />
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25h6M9 12h6m-6 3.75h6" />
        </svg>
        Anamnesis
      </h2>

      <!-- Síntomas -->
      <label class="block">
        <span class="mb-3 inline-block text-base font-bold text-gray-800"> Síntomas </span>
        <textarea
          name="sintomas"
          [(ngModel)]="consulta.sintomas"
          rows="5"
          class="focus:border-primary-500 focus:ring-primary-500 w-full resize-y rounded-xl border border-gray-300 bg-gray-50 p-4 text-sm text-gray-800 shadow-sm transition focus:bg-white focus:shadow-md"
          placeholder="Describe los síntomas del paciente..."
        ></textarea>
      </label>

      <!-- Diagnóstico -->
      <label class="block">
        <span class="mb-2 inline-block text-base font-semibold text-gray-800"> Diagnóstico </span>
        <textarea
          name="diagnostico"
          [(ngModel)]="consulta.diagnostico"
          rows="5"
          class="focus:border-primary-500 focus:ring-primary-500 w-full resize-y rounded-xl border border-gray-300 bg-gray-50 p-4 text-sm text-gray-800 shadow-sm transition focus:bg-white focus:shadow-md"
          placeholder="Ingresa el diagnóstico clínico..."
        ></textarea>
      </label>
    </div>

    <div class="hidden lg:block lg:w-px lg:bg-gray-200"></div>

    <div class="space-y-8 lg:col-span-4">
      <h2
        class="flex items-center gap-3 text-2xl font-extrabold leading-tight tracking-tight text-gray-900"
      >
        <svg
          class="h-7 w-7 shrink-0 text-gray-500"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M13.5 3L4.5 14.25h6L10.5 21 19.5 9.75h-6z"
          />
        </svg>
        Acciones
      </h2>

      <button
        type="submit"
        class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-emerald-500 px-6 py-3 text-base font-semibold text-white shadow transition hover:bg-emerald-600 focus:outline-none focus:ring-2 focus:ring-emerald-300 active:scale-[.98]"
      >
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
        Guardar consulta
      </button>
      <button
        type="button"
        (click)="cancelar()"
        class="inline-flex w-full items-center justify-center gap-2 rounded-xl border border-red-500 bg-red-50 px-6 py-3 text-base font-semibold text-red-600 transition hover:bg-red-600 hover:text-white hover:shadow active:scale-[.98]"
      >
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
        Cancelar
      </button>
    </div>
  </form>
</ng-container>

<ng-template #confirmTpl>
  <div class="w-[22rem] rounded-2xl bg-white p-6 shadow-xl ring-1 ring-gray-200">
    <h2 class="mb-6 flex items-baseline gap-2 text-xl font-semibold text-gray-900">
      <mat-icon fontIcon="help" class="!text-primary-600 text-xl leading-none"></mat-icon>
      Guardar consulta
    </h2>
    <p class="mb-6 text-sm text-gray-600">
      Esto registrará la consulta y marcará la cita como realizada.<br />
      ¿Deseas continuar?
    </p>

    <div class="flex justify-end gap-3">
      <button
        type="button"
        mat-stroked-button
        color="warn"
        [mat-dialog-close]="false"
        class="!rounded-lg !border-gray-300 !text-gray-700 hover:!bg-gray-50"
      >
        Volver
      </button>

      <button
        type="button"
        mat-flat-button
        color="primary"
        [mat-dialog-close]="true"
        class="!rounded-lg"
      >
        Sí, guardar
      </button>
    </div>
  </div>
</ng-template>
