<div
  class="flex min-h-screen items-center justify-center bg-gradient-to-br from-blue-50 via-white to-indigo-50 px-4 sm:px-6 lg:px-8"
>
  <div class="w-full max-w-md space-y-8">
    <!-- Header -->
    <div class="text-center">
      <div
        class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-r from-blue-600 to-indigo-600"
      >
        <i class="ri-user-line text-2xl text-white"></i>
      </div>
      <h2 class="mb-2 text-3xl font-bold text-gray-900">Bienvenido a HealthyMe</h2>
      <p class="text-gray-600">Inicia sesión para acceder a tu cuenta</p>
    </div>

    <!-- Form Card -->
    <div class="rounded-2xl border border-gray-100 bg-white p-8 shadow-xl">
      <form [formGroup]="loginForm" (ngSubmit)="handleLogin()" class="space-y-6">
        <!-- Usuario Field -->
        <div class="space-y-2">
          <label for="nombreUsuario" class="block text-sm font-medium text-gray-700">
            Usuario
          </label>
          <div class="relative">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
              <i class="ri-user-line text-gray-400"></i>
            </div>
            <input
              id="nombreUsuario"
              type="text"
              formControlName="nombreUsuario"
              placeholder="Ingresa tu usuario"
              [class]="
                'block w-full rounded-lg border py-3 pl-10 pr-3 placeholder-gray-400 shadow-sm transition-all duration-200 focus:border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500 ' +
                (isFieldInvalid('nombreUsuario')
                  ? 'border-red-300 bg-red-50'
                  : 'border-gray-300 bg-white hover:border-gray-400')
              "
            />
          </div>
          <div
            *ngIf="getFieldError('nombreUsuario')"
            class="mt-1 flex items-center text-sm text-red-600"
          >
            <i class="ri-error-warning-line mr-1"></i>
            {{ getFieldError('nombreUsuario') }}
          </div>
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
          <label for="password" class="block text-sm font-medium text-gray-700"> Contraseña </label>
          <div class="relative">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
              <i class="ri-lock-line text-gray-400"></i>
            </div>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Ingresa tu contraseña"
              [class]="
                'block w-full rounded-lg border py-3 pl-10 pr-12 placeholder-gray-400 shadow-sm transition-all duration-200 focus:border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500 ' +
                (isFieldInvalid('password')
                  ? 'border-red-300 bg-red-50'
                  : 'border-gray-300 bg-white hover:border-gray-400')
              "
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 transition-colors hover:text-gray-600"
            >
              <i [class]="showPassword ? 'ri-eye-off-line' : 'ri-eye-line'"></i>
            </button>
          </div>
          <div
            *ngIf="getFieldError('password')"
            class="mt-1 flex items-center text-sm text-red-600"
          >
            <i class="ri-error-warning-line mr-1"></i>
            {{ getFieldError('password') }}
          </div>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input
              id="rememberMe"
              type="checkbox"
              formControlName="rememberMe"
              class="h-4 w-4 rounded border-gray-300 text-blue-600 transition-colors focus:ring-blue-500"
            />
            <label for="rememberMe" class="ml-2 block cursor-pointer text-sm text-gray-700">
              Recordarme
            </label>
          </div>
          <a
            routerLink="/recuperar-password"
            class="text-sm font-medium text-blue-600 transition-colors hover:text-blue-800"
          >
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <!-- Error Message -->
        <div *ngIf="error" class="rounded-lg border border-red-200 bg-red-50 p-4">
          <div class="flex items-center">
            <i class="ri-error-warning-line mr-2 text-red-500"></i>
            <span class="text-sm text-red-700">{{ error }}</span>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading || loginForm.invalid"
          class="flex w-full transform items-center justify-center rounded-lg border border-transparent bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3 font-medium text-white shadow-sm transition-all duration-200 hover:scale-[1.02] hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-50"
        >
          <span *ngIf="!isLoading">Iniciar Sesión</span>
          <div *ngIf="isLoading" class="flex items-center">
            <svg
              class="-ml-1 mr-3 h-5 w-5 animate-spin text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            Iniciando sesión...
          </div>
        </button>

        <!-- Divider -->
        <div class="relative mt-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="bg-white px-4 text-gray-500">¿Eres nuevo en HealthyMe?</span>
          </div>
        </div>

        <!-- Register Link -->
        <div class="text-center">
          <a
            routerLink="/citas/agendar"
            class="inline-flex items-center rounded-lg border border-blue-600 px-6 py-3 font-medium text-blue-600 transition-colors hover:bg-blue-50"
          >
            <i class="ri-calendar-check-line mr-2"></i>
            Agenda tu primera cita
          </a>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center text-sm text-gray-500">
      <p>© 2025 HealthyMe. Todos los derechos reservados.</p>
      <div class="mt-2 space-x-4">
        <a href="/terminos" class="transition-colors hover:text-gray-700">Términos</a>
        <a href="/privacidad" class="transition-colors hover:text-gray-700">Privacidad</a>
        <a href="/contacto" class="transition-colors hover:text-gray-700">Contacto</a>
      </div>
    </div>
  </div>
</div>
