<div class="fixed bottom-6 right-6 z-50">
  <!-- Botón principal del chat -->
  <button
    type="button"
    (click)="toggleChat()"
    [@bounce]="animationState"
    class="group relative flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg transition-all duration-300 hover:from-blue-600 hover:to-blue-700 hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-800"
    [class.animate-pulse]="!isConnected"
  >
    <!-- Icono del chat -->
    <div class="relative">
      <!-- Icono cuando está cerrado -->
      <i
        *ngIf="!isOpen"
        class="ri-message-3-line text-2xl transition-transform duration-300 group-hover:scale-110"
      ></i>

      <!-- Icono cuando está abierto -->
      <i
        *ngIf="isOpen"
        class="ri-close-line text-2xl transition-transform duration-300 group-hover:scale-110"
      ></i>

      <!-- Indicador de mensajes no leídos -->
      <div
        *ngIf="hasUnreadMessages && !isOpen"
        class="absolute -right-2 -top-2 flex h-5 w-5 animate-bounce items-center justify-center rounded-full bg-red-500 text-xs font-bold text-white"
      >
        !
      </div>

      <!-- Indicador de conexión -->
      <div
        class="absolute -bottom-1 -right-1 h-4 w-4 rounded-full border-2 border-white transition-colors duration-300"
        [class.bg-green-500]="isConnected"
        [class.bg-red-500]="!isConnected"
      ></div>
    </div>
  </button>

  <!-- Tooltip -->
  <div class="absolute bottom-20 right-0 mb-2 hidden group-hover:block">
    <div class="relative">
      <div class="rounded-lg bg-gray-900 px-3 py-2 text-sm text-white shadow-lg dark:bg-gray-700">
        {{ isOpen ? 'Cerrar chat' : 'Asistente médico virtual' }}
        <div
          class="absolute -bottom-1 right-4 h-2 w-2 rotate-45 bg-gray-900 dark:bg-gray-700"
        ></div>
      </div>
    </div>
  </div>

  <!-- Indicador de estado offline -->
  <div *ngIf="!isConnected && !isOpen" class="absolute -top-2 left-0 right-0 text-center">
    <span class="inline-block rounded-full bg-yellow-500 px-2 py-1 text-xs text-white">
      Offline
    </span>
  </div>
</div>
