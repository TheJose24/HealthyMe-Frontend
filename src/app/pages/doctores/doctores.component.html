<!-- eslint-disable prettier/prettier -->
<section class="relative overflow-hidden bg-white dark:bg-gray-900">
  <div class="justify-items-center p-5">
    <h1 class="m-5 text-4xl font-extrabold text-blue-600 dark:text-white">Busca tu Doctor</h1>
  </div>
  <div class="justify-items-center p-5">
    <form
      action=""
      class="grid grid-cols-1 items-center gap-x-8 gap-y-3 sm:grid-cols-2 md:grid-cols-4"
    >
      <input
        type="text"
        placeholder="Nombre"
        class="dark- block w-auto rounded-3xl border border-blue-700 p-2.5 font-semibold placeholder:font-semibold placeholder:text-black focus:border-blue-800 dark:border-white dark:bg-inherit dark:text-white dark:placeholder:text-white"
      />
      <select
        class="w-auto rounded-3xl border border-blue-700 p-2.5 font-semibold dark:border-white dark:bg-inherit dark:text-white"
      >
        <option>Seleccione...</option>
      </select>
      <select
        class="w-auto rounded-3xl border border-blue-700 p-2.5 font-semibold dark:border-white dark:bg-inherit dark:text-white"
      >
        <option>Seleccione...</option>
      </select>
      <button
        type="submit"
        class="w-auto rounded-3xl bg-blue-600 p-2.5 font-semibold text-white transition hover:bg-blue-800"
      >
        Buscar
      </button>
    </form>
  </div>

  <!-- Lista Doctores -->
  <div class="grid grid-cols-1 justify-items-center p-6">
    <div
      *ngFor="let doctor of doctores"
      class="grid w-3/6 grid-cols-1 items-center justify-items-center gap-x-10 gap-y-6 p-5 md:grid-cols-3"
    >
      <img [src]="doctor.image" [alt]="doctor.name" class="mb-4 w-28 rounded-md object-cover" />
      <div class="justify-center">
        <h2 class="w-full text-2xl font-semibold text-gray-500 dark:text-white">
          {{ doctor.name.toUpperCase() }}
        </h2>
      </div>
      <button
        type="button"
        class="w-44 rounded-3xl bg-blue-600 p-2.5 font-semibold text-white hover:bg-blue-800"
      >
        Ver Detalles
      </button>
    </div>
  </div>
</section>
