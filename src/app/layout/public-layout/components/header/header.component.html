<header
  class="w-full transition-all duration-300"
  [ngClass]="{
    'bg-white/90 shadow-md dark:bg-gray-dark/90': isScrolled(),
    'bg-white/80 dark:bg-gray-dark/80': !isScrolled(),
  }"
>
  <div class="container mx-auto flex items-center justify-between px-4 py-3">
    <!-- En modo móvil: Botón de modo oscuro (izquierda) -->
    <div class="md:hidden">
      <button
        type="button"
        (click)="toggleDarkMode()"
        class="rounded-full p-2 text-gray-medium transition-colors duration-200 hover:bg-gray-light/50 focus:outline-none focus:ring-2 focus:ring-primary dark:text-gray-light dark:hover:bg-gray-softer/20 dark:focus:ring-primary-light"
        aria-label="Cambiar modo oscuro"
      >
        @if (!darkMode()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
              clip-rule="evenodd"
            />
          </svg>
        }
      </button>
    </div>

    <!-- Logo (izquierda en desktop, centro en móvil) -->
    <div class="flex flex-1 flex-shrink-0 justify-center md:order-1 md:flex-none md:justify-start">
      <a routerLink="/" class="flex items-center">
        <app-logo [isDarkMode]="darkMode()" size="medium"></app-logo>
      </a>
    </div>

    <!-- Navegación (centro en desktop, oculto en móvil) -->
    <nav class="hidden flex-1 items-center justify-center md:order-2 md:flex">
      <ul class="flex items-center space-x-8">
        @for (item of navigationItems; track item.route) {
          <li>
            <a
              [routerLink]="item.route"
              routerLinkActive="text-primary-light border-b-2 border-primary-light font-medium"
              [routerLinkActiveOptions]="{ exact: item.route === '/' }"
              class="px-2 py-3 text-gray-medium transition-colors duration-200 ease-in-out hover:border-b-2 hover:border-primary/40 hover:text-primary dark:text-gray-light dark:hover:text-primary-light"
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- Botones (derecha en desktop) -->
    <div class="flex flex-shrink-0 items-center space-x-4 md:order-3">
      <!-- Botón de modo oscuro (solo en desktop) -->
      <button
        type="button"
        (click)="toggleDarkMode()"
        class="hidden rounded-full p-2 text-gray-medium transition-colors duration-200 hover:bg-gray-light/50 focus:outline-none focus:ring-2 focus:ring-primary dark:text-gray-light dark:hover:bg-gray-softer/20 dark:focus:ring-primary-light md:block"
        aria-label="Cambiar modo oscuro"
      >
        @if (!darkMode()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
              clip-rule="evenodd"
            />
          </svg>
        }
      </button>

      <!-- Botón de reserva (versión desktop) -->
      <a
        routerLink="/citas/agendar"
        class="hidden items-center rounded-md bg-primary px-4 py-2 text-white transition-colors duration-200 ease-in-out hover:bg-primary-light dark:bg-primary dark:text-white dark:hover:bg-primary-light md:inline-flex"
      >
        <span>Reservar Cita</span>
        <svg
          width="20"
          height="18"
          viewBox="0 0 20 18"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="ml-2"
        >
          <path
            d="M2.68317 9H7.9165L8.33317 8.16667L9.99984 11.9167L11.6665 6.08333L12.9165 9H17.3082M15.8332 10.6667C17.0748 9.45 18.3332 7.99167 18.3332 6.08333C18.3332 4.86776 17.8503 3.70197 16.9907 2.84243C16.1312 1.98289 14.9654 1.5 13.7498 1.5C12.2832 1.5 11.2498 1.91667 9.99984 3.16667C8.74984 1.91667 7.7165 1.5 6.24984 1.5C5.03426 1.5 3.86847 1.98289 3.00893 2.84243C2.14939 3.70197 1.6665 4.86776 1.6665 6.08333C1.6665 8 2.9165 9.45833 4.1665 10.6667L9.99984 16.5L15.8332 10.6667Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>

      <!-- Botón de menú móvil (derecha) -->
      <button
        type="button"
        (click)="toggleMobileMenu()"
        class="rounded-md p-2 text-gray-medium focus:outline-none focus:ring-2 focus:ring-primary dark:text-gray-light dark:focus:ring-primary-light md:hidden"
        aria-label="Abrir menú"
        [attr.aria-expanded]="mobileMenuOpen()"
      >
        @if (!mobileMenuOpen()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16m-7 6h7"
            />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Menú móvil (controlado por mobileMenuOpen) -->
  <div
    class="absolute left-0 right-0 z-40 w-full transform overflow-hidden transition-all duration-300 ease-in-out md:hidden"
    [ngClass]="{
      'pointer-events-none max-h-0 opacity-0': !mobileMenuOpen(),
      'max-h-[500px] border-t border-gray-light bg-white/95 opacity-100 shadow-lg dark:border-gray-softer/20 dark:bg-gray-dark/95':
        mobileMenuOpen(),
    }"
  >
    <div class="space-y-1 px-4 py-3">
      @for (item of navigationItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-primary/10 text-primary dark:bg-primary/20 dark:text-primary-light"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="block rounded-md px-3 py-2 text-base font-medium text-gray-medium transition-colors hover:bg-gray-light/50 dark:text-gray-light dark:hover:bg-gray-softer/30"
          (click)="closeMobileMenu()"
        >
          {{ item.label }}
        </a>
      }
    </div>
    <div class="border-t border-gray-light px-4 py-4 dark:border-gray-softer/20">
      <!-- Botón de reserva (versión móvil) -->
      <a
        routerLink="/citas/agendar"
        class="flex w-full items-center justify-center rounded-md bg-primary px-4 py-2 text-center text-white transition-colors hover:bg-primary-light dark:bg-primary dark:text-white dark:hover:bg-primary-light"
        (click)="closeMobileMenu()"
      >
        <span>Reservar Cita</span>
        <svg
          width="20"
          height="18"
          viewBox="0 0 20 18"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="ml-2"
        >
          <path
            d="M2.68317 9H7.9165L8.33317 8.16667L9.99984 11.9167L11.6665 6.08333L12.9165 9H17.3082M15.8332 10.6667C17.0748 9.45 18.3332 7.99167 18.3332 6.08333C18.3332 4.86776 17.8503 3.70197 16.9907 2.84243C16.1312 1.98289 14.9654 1.5 13.7498 1.5C12.2832 1.5 11.2498 1.91667 9.99984 3.16667C8.74984 1.91667 7.7165 1.5 6.24984 1.5C5.03426 1.5 3.86847 1.98289 3.00893 2.84243C2.14939 3.70197 1.6665 4.86776 1.6665 6.08333C1.6665 8 2.9165 9.45833 4.1665 10.6667L9.99984 16.5L15.8332 10.6667Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </div>
  </div>
</header>
